# Appends a UTC timestamp to logs/heartbeat.log and pushes (optional daily "activity" signal).
# For commits to count on *your* GitHub contribution graph, set repository secret
# HEARTBEAT_GIT_EMAIL to an email verified on your GitHub account.
# See logs/README.md

name: Daily heartbeat

on:
  schedule:
    - cron: "15 5 * * *" # 05:15 UTC every day; change if you want another wall-clock time
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-heartbeat
  cancel-in-progress: true

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Append timestamp
        run: |
          mkdir -p logs
          echo "$(date -u -Iseconds)Z heartbeat" >> logs/heartbeat.log

      - name: Commit and push
        env:
          AUTHOR_EMAIL: ${{ secrets.HEARTBEAT_GIT_EMAIL }}
        run: |
          set -e
          if [ -n "$AUTHOR_EMAIL" ]; then
            git config user.name "${{ github.actor }}"
            git config user.email "$AUTHOR_EMAIL"
          else
            echo "::warning title=Contribution graph::Set repository secret HEARTBEAT_GIT_EMAIL to a verified GitHub email, or this commit may not appear on your personal contribution graph."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
          fi
          git add logs/heartbeat.log
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: daily heartbeat $GITHUB_RUN_ID"
          git push
